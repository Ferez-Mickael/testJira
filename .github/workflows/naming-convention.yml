name: "Jira Naming Enforcer (Branch, PR, Commits)"

on:
  create: # Triggers instantly when a new branch is created on the GitHub UI or via terminal
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  enforce-conventions:
    # Only run on PR events, or branch creation events (safely ignores tag creations)
    if: github.event_name == 'pull_request' || (github.event_name == 'create' && github.event.ref_type == 'branch')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ------------------------------------------------------------------
      # 1. VALIDATE BRANCH NAME (Runs on Creation & PRs)
      # ------------------------------------------------------------------
      - name: 1. Validate Branch Name
        run: |
          # Automatically detect branch name based on the event context
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BRANCH_NAME="${{ github.head_ref }}"
          else
            BRANCH_NAME="${{ github.event.ref }}"
          fi
          
          echo "Checking Branch Name: $BRANCH_NAME"
          
          # Skip checking system default branches to avoid unnecessary self-failures
          if [[ "$BRANCH_NAME" == "main" || "$BRANCH_NAME" == "master" || "$BRANCH_NAME" == "develop" ]]; then
            echo "✅ Skipping validation rules for default/production branches."
            exit 0
          fi
          
          # Matches format: PROJ-123/feat-login-page
          REGEX="^[A-Z]+-[0-9]+\/(feat|fix|chore)-.+$"
          
          if [[ ! "$BRANCH_NAME" =~ $REGEX ]]; then
            echo "::error::Branch name '$BRANCH_NAME' is invalid."
            echo "Expected format: <JIRA-ID>/<keyword>-<description>"
            echo "Example: PROJ-123/feat-login-page"
            exit 1
          fi
          echo "✅ Branch Name is valid!"

      # ------------------------------------------------------------------
      # 2. VALIDATE PULL REQUEST TITLE (Only runs on PRs)
      # ------------------------------------------------------------------
      - name: 2. Validate PR Title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "Checking PR Title: $PR_TITLE"
          
          # Matches format: PROJ-123-feat : Add login page
          REGEX="^[A-Z]+-[0-9]+-(feat|fix|chore)[ ]+:[ ]+.+$"
          
          if [[ ! "$PR_TITLE" =~ $REGEX ]]; then
            echo "::error::PR Title '$PR_TITLE' is invalid."
            echo "Expected format: <JIRA-ID>-<keyword> : <description>"
            echo "Example: PROJ-123-feat : Add login page"
            exit 1
          fi
          echo "✅ PR Title is valid!"

      # ------------------------------------------------------------------
      # 3. VALIDATE ALL COMMIT MESSAGES (Only runs on PRs)
      # ------------------------------------------------------------------
      - name: 3. Validate All Commit Messages
        if: github.event_name == 'pull_request'
        run: |
          echo "Checking all commits in this Pull Request..."
          
          # Precise SHAs prevent standard Git context checkout failures
          COMMITS=$(git log --no-merges --format=%s ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})
          
          if [[ -z "$COMMITS" ]]; then
            echo "✅ No new commits found to validate."
            exit 0
          fi
          
          # Matches format: PROJ-123-fix : login timeout loop
          REGEX="^[A-Z]+-[0-9]+-(feat|fix|chore)[ ]+:[ ]+.+$"
          
          while IFS= read -r commit; do
            if [[ -z "$commit" ]]; then continue; fi
            echo "Checking commit: $commit"
            if [[ ! "$commit" =~ $REGEX ]]; then
              echo "::error::Commit message '$commit' is invalid."
              echo "Expected format: '<JIRA-ID>-<keyword> : <description>'"
              echo "Example: PROJ-123-fix : login timeout loop"
              exit 1
            fi
          done <<< "$COMMITS"
          
          echo "✅ All commit messages are valid!"
